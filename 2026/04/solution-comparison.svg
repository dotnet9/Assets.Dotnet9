<svg height="510" viewBox="0 0 800 510" width="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect fill="url(#bgGradient)" width="800" height="510"/>

  <g transform="translate(30, 20)" filter="url(#cardShadow)">
    <rect fill="white" rx="16" width="740" height="460"/>

    <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" x="370" y="50">四种方案对比</text>

    <rect fill="#f8fafc" x="50" y="70" width="640" height="35" rx="8"/>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="115" y="92">方案</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="360" y="92">做法</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="600" y="92">结果</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="50" y="110" width="640" height="80" rx="8"/>
    <g transform="translate(50, 110)">
      <rect fill="url(#successGrad)" rx="6" x="20" y="15" width="130" height="50" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="85" y="45" filter="url(#textShadow)">方案一</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="13" text-anchor="middle" x="360" y="145">NativeLibrary 动态加载</text>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" x="360" y="168">运行时判断 + 路径拼接</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="600" y="150">✅ 成功</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="600" y="172">全平台可用</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="50" y="195" width="640" height="80" rx="8"/>
    <g transform="translate(50, 195)">
      <rect fill="url(#successGrad)" rx="6" x="20" y="15" width="130" height="50" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="85" y="45" filter="url(#textShadow)">方案二</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="13" text-anchor="middle" x="360" y="230">静态引用-单工程</text>
    <text fill="#334155" font-family="Consolas, monospace" font-size="12" text-anchor="middle" x="360" y="253">#if WIN_X64 #elif LINUX_X64 条件编译</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="600" y="235">✅ 成功</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="600" y="257">仅单工程</text>

    <rect fill="#fef2f2" stroke="#fca5a5" stroke-width="2" x="50" y="280" width="640" height="80" rx="8"/>
    <g transform="translate(50, 280)">
      <rect fill="url(#failGrad)" rx="6" x="20" y="15" width="130" height="50" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="85" y="45" filter="url(#textShadow)">方案三</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="13" text-anchor="middle" x="360" y="315">静态引用-多工程</text>
    <text fill="#334155" font-family="Consolas, monospace" font-size="12" text-anchor="middle" x="360" y="338">类库中条件编译</text>
    <text fill="#dc2626" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="600" y="320">❌ 失败</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="600" y="342">类库不继承宏</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="50" y="365" width="640" height="80" rx="8"/>
    <g transform="translate(50, 365)">
      <rect fill="url(#successGrad)" rx="6" x="20" y="15" width="130" height="50" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="85" y="45" filter="url(#textShadow)">方案四</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="13" text-anchor="middle" x="360" y="400">静态引用-多工程</text>
    <text fill="#334155" font-family="Consolas, monospace" font-size="12" text-anchor="middle" x="360" y="423">仅库名 + csproj配置</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="600" y="405">✅ 推荐</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="600" y="427">跨平台完美</text>
  </g>
</svg>
