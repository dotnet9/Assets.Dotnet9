<svg height="390" viewBox="0 0 800 390" width="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect fill="url(#bgGradient)" width="800" height="390"/>

  <g transform="translate(30, 20)" filter="url(#cardShadow)">
    <rect fill="white" rx="16" width="740" height="340"/>

    <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" x="370" y="50">三种方案对比</text>

    <rect fill="#f8fafc" x="50" y="70" width="640" height="40" rx="8"/>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="130" y="96">方案</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="360" y="96">做法</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="590" y="96">结果</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="50" y="115" width="640" height="75" rx="8"/>
    <g transform="translate(50, 115)">
      <rect fill="url(#successGrad)" rx="6" x="20" y="15" width="140" height="45" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="90" y="42" filter="url(#textShadow)">方案一</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="14" text-anchor="middle" x="360" y="145">NativeLibrary 动态绑定</text>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="13" text-anchor="middle" x="360" y="168">手动加载 + 路径解析</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="590" y="148">✅ 全平台可用</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="590" y="172">配合VC-LTL+YY-Thunks</text>

    <rect fill="#fffbeb" stroke="#fbbf24" stroke-width="2" x="50" y="195" width="640" height="75" rx="8"/>
    <g transform="translate(50, 195)">
      <rect fill="url(#warningGrad)" rx="6" x="20" y="15" width="140" height="45" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="90" y="42" filter="url(#textShadow)">方案二</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="14" text-anchor="middle" x="360" y="225">平台宏定义</text>
    <text fill="#334155" font-family="Consolas, monospace" font-size="13" text-anchor="middle" x="360" y="248">#if WIN_X64 条件编译</text>
    <text fill="#d97706" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="590" y="228">⚠️ 部分成功</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="590" y="252">NuGet包不继承宏</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="50" y="275" width="640" height="75" rx="8"/>
    <g transform="translate(50, 275)">
      <rect fill="url(#successGrad)" rx="6" x="20" y="15" width="140" height="45" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="90" y="42" filter="url(#textShadow)">方案三</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="14" text-anchor="middle" x="360" y="305">DllImport 常量库名</text>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="13" text-anchor="middle" x="360" y="328">只写库名 + csproj条件复制</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="590" y="308">✅ 成功</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="590" y="332">跨平台完美兼容</text>
  </g>
</svg>
