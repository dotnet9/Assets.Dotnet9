<svg height="320" viewbox="0 0 700 320" width="700" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <lineargradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f4fc"></stop>
      <stop offset="50%" stop-color="#d4e9f7"></stop>
      <stop offset="100%" stop-color="#c5dff0"></stop>
    </lineargradient>
    <lineargradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4caf50"></stop>
      <stop offset="100%" stop-color="#388e3c"></stop>
    </lineargradient>
    <lineargradient id="partialGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9800"></stop>
      <stop offset="100%" stop-color="#f57c00"></stop>
    </lineargradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <fedropshadow dx="2" dy="2" flood-opacity="0.15" stddeviation="3"></fedropshadow>
    </filter>
  </defs>

  <rect fill="url(#bgGrad)" width="700" height="320"></rect>

  <rect fill="white" filter="url(#shadow)" rx="10" ry="10" x="20" y="15" width="660" height="290"></rect>

  <text fill="#1a1a2e" font-family="Microsoft YaHei" font-size="18" font-weight="bold" text-anchor="middle" x="350" y="45">三种方案对比</text>

  <rect fill="#f0f4f8" x="40" y="60" width="620" height="35" rx="4"></rect>
  <text fill="#333" font-family="Microsoft YaHei" font-size="13" font-weight="bold" text-anchor="middle" x="120" y="82">方案</text>
  <text fill="#333" font-family="Microsoft YaHei" font-size="13" font-weight="bold" text-anchor="middle" x="320" y="82">做法</text>
  <text fill="#333" font-family="Microsoft YaHei" font-size="13" font-weight="bold" text-anchor="middle" x="520" y="82">结果</text>

  <rect fill="#fff8f0" stroke="#ff9800" stroke-width="1" x="40" y="95" width="620" height="65" rx="4"></rect>
  <rect fill="url(#partialGrad)" rx="4" ry="4" x="55" y="108" width="120" height="38" filter="url(#shadow)"></rect>
  <text fill="#1a1a2e" font-family="Microsoft YaHei" font-size="13" font-weight="bold" text-anchor="middle" x="115" y="133">方案一</text>
  <text fill="#333" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="320" y="118">NativeLibrary</text>
  <text fill="#333" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="320" y="138">动态绑定</text>
  <text fill="#e65100" font-family="Microsoft YaHei" font-size="12" font-weight="bold" text-anchor="middle" x="520" y="125">⚠️ 部分成功</text>
  <text fill="#666" font-family="Microsoft YaHei" font-size="11" text-anchor="middle" x="520" y="145">部分Win7系统不兼容</text>

  <rect fill="#fff8f0" stroke="#ff9800" stroke-width="1" x="40" y="160" width="620" height="65" rx="4"></rect>
  <rect fill="url(#partialGrad)" rx="4" ry="4" x="55" y="173" width="120" height="38" filter="url(#shadow)"></rect>
  <text fill="#1a1a2e" font-family="Microsoft YaHei" font-size="13" font-weight="bold" text-anchor="middle" x="115" y="198">方案二</text>
  <text fill="#333" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="320" y="183">平台宏定义</text>
  <text fill="#333" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="320" y="203">#if WIN_X64</text>
  <text fill="#e65100" font-family="Microsoft YaHei" font-size="12" font-weight="bold" text-anchor="middle" x="520" y="190">⚠️ 部分成功</text>
  <text fill="#666" font-family="Microsoft YaHei" font-size="11" text-anchor="middle" x="520" y="210">NuGet包不继承宏</text>

  <rect fill="#f0fff0" stroke="#4caf50" stroke-width="1" x="40" y="225" width="620" height="65" rx="4"></rect>
  <rect fill="url(#successGrad)" rx="4" ry="4" x="55" y="238" width="120" height="38" filter="url(#shadow)"></rect>
  <text fill="#1a1a2e" font-family="Microsoft YaHei" font-size="13" font-weight="bold" text-anchor="middle" x="115" y="263">方案三</text>
  <text fill="#333" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="320" y="248">DllImport</text>
  <text fill="#333" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="320" y="268">常量库名 + csproj复制</text>
  <text fill="#2e7d32" font-family="Microsoft YaHei" font-size="12" font-weight="bold" text-anchor="middle" x="520" y="255">✅ 成功</text>
  <text fill="#666" font-family="Microsoft YaHei" font-size="11" text-anchor="middle" x="520" y="275">跨平台完美兼容</text>
</svg>