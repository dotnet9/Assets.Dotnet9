<svg height="480" viewBox="0 0 820 480" width="820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect fill="url(#bgGradient)" width="820" height="480"/>

  <g transform="translate(25, 15)" filter="url(#cardShadow)">
    <rect fill="white" rx="16" width="770" height="450"/>

    <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" x="385" y="40">四种成功方案对比</text>

    <rect fill="#f8fafc" x="30" y="55" width="710" height="30" rx="6"/>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="90" y="74">方案</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="340" y="74">做法</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="570" y="74">结果</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="30" y="90" width="710" height="65" rx="6"/>
    <g transform="translate(30, 90)">
      <rect fill="url(#successGrad)" rx="6" x="15" y="10" width="100" height="45" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="65" y="38" filter="url(#textShadow)">方案一</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" x="340" y="118">NativeLibrary 动态加载</text>
    <text fill="#334155" font-family="Consolas, monospace" font-size="11" text-anchor="middle" x="340" y="138">运行时判断 + 路径拼接</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="570" y="118">✅ 成功</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" x="570" y="138">全平台可用</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="30" y="160" width="710" height="65" rx="6"/>
    <g transform="translate(30, 160)">
      <rect fill="url(#successGrad)" rx="6" x="15" y="10" width="100" height="45" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="65" y="38" filter="url(#textShadow)">方案二</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" x="340" y="188">静态-单工程+条件编译</text>
    <text fill="#334155" font-family="Consolas, monospace" font-size="11" text-anchor="middle" x="340" y="208">#if PLATFORM_WIN_X64</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="570" y="188">✅ 成功</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" x="570" y="208">仅主工程</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="30" y="230" width="710" height="65" rx="6"/>
    <g transform="translate(30, 230)">
      <rect fill="url(#successGrad)" rx="6" x="15" y="10" width="100" height="45" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="65" y="38" filter="url(#textShadow)">方案三</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" x="340" y="258">静态-多工程+条件编译</text>
    <text fill="#334155" font-family="Consolas, monospace" font-size="11" text-anchor="middle" x="340" y="278">发布前通过脚本全局设置宏</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="570" y="258">✅ 成功</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" x="570" y="278">配合发布脚本</text>

    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="2" x="30" y="300" width="710" height="65" rx="6"/>
    <g transform="translate(30, 300)">
      <rect fill="url(#successGrad)" rx="6" x="15" y="10" width="100" height="45" filter="url(#cardShadow)"/>
      <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="65" y="38" filter="url(#textShadow)">方案四</text>
    </g>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" x="340" y="328">静态-多工程+仅库名</text>
    <text fill="#334155" font-family="Consolas, monospace" font-size="11" text-anchor="middle" x="340" y="348">DllImport("Lib/Time") + csproj重命名</text>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" x="570" y="328">✅ 最推荐</text>
    <text fill="#78716c" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" x="570" y="348">简单可靠</text>

    <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="385" y="400">核心经验</text>
    <text fill="#64748b" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="385" y="420">1. 推荐使用 DllImport 常量库名（不加扩展名）  2. 条件编译宏需配合发布脚本全局设置</text>
  </g>
</svg>