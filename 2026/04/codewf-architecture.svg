<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1976D2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ACC1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00838F;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="#f5f7fa"/>

  <rect x="20" y="20" width="760" height="460" rx="10" fill="white" filter="url(#shadow)"/>

  <rect x="40" y="40" width="720" height="50" rx="6" fill="url(#headerGrad)"/>
  <text x="400" y="72" text-anchor="middle" fill="white" font-size="20" font-weight="bold">CodeWF 网站架构图</text>

  <rect x="60" y="110" width="200" height="80" rx="8" fill="url(#webGrad)" filter="url(#shadow)"/>
  <text x="160" y="145" text-anchor="middle" fill="white" font-size="14" font-weight="bold">WebApp (Razor Pages)</text>
  <text x="160" y="165" text-anchor="middle" fill="white" font-size="11">Pages/</text>
  <text x="160" y="180" text-anchor="middle" fill="white" font-size="11">Components/</text>
  <text x="160" y="195" text-anchor="middle" fill="white" font-size="11">Controllers/</text>

  <rect x="300" y="110" width="200" height="80" rx="8" fill="url(#coreGrad)" filter="url(#shadow)"/>
  <text x="400" y="145" text-anchor="middle" fill="white" font-size="14" font-weight="bold">CodeWF (核心库)</text>
  <text x="400" y="165" text-anchor="middle" fill="white" font-size="11">Models/</text>
  <text x="400" y="180" text-anchor="middle" fill="white" font-size="11">Services/</text>
  <text x="400" y="195" text-anchor="middle" fill="white" font-size="11">Extensions/</text>

  <rect x="540" y="110" width="200" height="80" rx="8" fill="#7E57C2" filter="url(#shadow)"/>
  <text x="640" y="145" text-anchor="middle" fill="white" font-size="14" font-weight="bold">静态资源</text>
  <text x="640" y="165" text-anchor="middle" fill="white" font-size="11">wwwroot/</text>
  <text x="640" y="180" text-anchor="middle" fill="white" font-size="11">css/, js/, lib/</text>

  <path d="M260 150 L300 150" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500 150 L540 150" stroke="#455A64" stroke-width="2"/>
  <path d="M160 190 L160 230 L400 230 L400 210" stroke="#455A64" stroke-width="2" fill="none"/>
  <path d="M400 190 L400 260" stroke="#455A64" stroke-width="2" fill="none"/>

  <rect x="60" y="250" width="320" height="200" rx="8" fill="white" stroke="#1976D2" stroke-width="2"/>
  <text x="220" y="275" text-anchor="middle" fill="#1976D2" font-size="14" font-weight="bold">Pages 目录结构</text>

  <rect x="80" y="290" width="280" height="30" rx="4" fill="#E3F2FD"/>
  <text x="95" y="310" fill="#1565C0" font-size="12">📄 Index.cshtml      首页</text>

  <rect x="80" y="325" width="280" height="30" rx="4" fill="#E3F2FD"/>
  <text x="95" y="345" fill="#1565C0" font-size="12">📄 Post/Index.cshtml 文章详情页</text>

  <rect x="80" y="360" width="280" height="30" rx="4" fill="#E3F2FD"/>
  <text x="95" y="380" fill="#1565C0" font-size="12">📄 Tool/Index.cshtml 工具列表页</text>

  <rect x="80" y="395" width="280" height="30" rx="4" fill="#E8F5E9"/>
  <text x="95" y="415" fill="#2E7D32" font-size="12">⚙️ _Layout.cshtml    共享布局</text>

  <rect x="420" y="250" width="320" height="200" rx="8" fill="white" stroke="#00838F" stroke-width="2"/>
  <text x="580" y="275" text-anchor="middle" fill="#00838F" font-size="14" font-weight="bold">Models 数据模型</text>

  <rect x="440" y="290" width="280" height="30" rx="4" fill="#E0F7FA"/>
  <text x="455" y="310" fill="#006064" font-size="12">📦 BlogPost          博客文章</text>

  <rect x="440" y="325" width="280" height="30" rx="4" fill="#E0F7FA"/>
  <text x="455" y="345" fill="#006064" font-size="12">📦 ToolItem          工具项</text>

  <rect x="440" y="360" width="280" height="30" rx="4" fill="#E0F7FA"/>
  <text x="455" y="380" fill="#006064" font-size="12">📦 DocItem           文档项</text>

  <rect x="440" y="395" width="280" height="30" rx="4" fill="#E0F7FA"/>
  <text x="455" y="415" fill="#006064" font-size="12">📦 CategoryItem      分类项</text>

  <rect x="40" y="460" width="720" height="5" rx="2" fill="#CFD8DC"/>
</svg>