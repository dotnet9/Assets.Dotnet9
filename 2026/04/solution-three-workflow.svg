<svg height="420" viewBox="0 0 850 420" width="850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect fill="url(#bgGrad)" width="850" height="420"/>

  <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" x="425" y="35">方案三：DllImport 常量库名工作流程</text>

  <g transform="translate(30, 60)" filter="url(#cardShadow)">
    <rect fill="#fff" rx="12" width="200" height="130"/>
    <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="100" y="25">1. 源目录结构</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="25" y="50">Lib/</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="40" y="68">├── x64/</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="55" y="86">│   └── StudentUtilApi.dll</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="40" y="104">├── x86/</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="40" y="122">└── arm64/</text>
  </g>

  <path d="M240, 120 L310, 120" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(320, 60)" filter="url(#cardShadow)">
    <rect fill="#fff" rx="12" width="210" height="130"/>
    <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="105" y="25">2. csproj配置</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="11" x="15" y="50">根据 RuntimeIdentifier</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="11" x="15" y="68">条件复制文件</text>
    <rect fill="#f0fdf4" stroke="#4ade80" stroke-width="1" rx="4" x="15" y="78" width="180" height="25"/>
    <text fill="#16a34a" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" x="105" y="96">使用 Link 机制</text>
    <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="11" x="15" y="118">重命名到根目录</text>
  </g>

  <path d="M540, 120 L610, 120" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(620, 60)" filter="url(#cardShadow)">
    <rect fill="#fff" rx="12" width="200" height="130"/>
    <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="100" y="25">3. 输出目录</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="25" y="50">output/</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="40" y="68">├── App.exe</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="40" y="86">├── App.dll</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="40" y="104">└── StudentUtilApi.dll</text>
    <text fill="#475569" font-family="Consolas, monospace" font-size="11" x="40" y="122">   (或 libStudentUtilApi.so)</text>
  </g>

  <g transform="translate(230, 210)" filter="url(#cardShadow)">
    <rect fill="url(#primaryGrad)" rx="12" width="390" height="70"/>
    <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="195" y="30">4. 代码调用（保持统一）</text>
    <text fill="rgba(255,255,255,0.95)" font-family="Consolas, monospace" font-size="13" text-anchor="middle" x="195" y="55">[DllImport("StudentUtilApi")]</text>
  </g>

  <path d="M425, 290 L425, 320" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(280, 330)" filter="url(#cardShadow)">
    <rect fill="url(#successGrad)" rx="12" width="290" height="80"/>
    <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" x="145" y="32">✅ 完成</text>
    <text fill="rgba(255,255,255,0.95)" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" x="145" y="52">操作系统自动加载</text>
    <text fill="rgba(255,255,255,0.9)" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" x="145" y="68">跨平台完美兼容</text>
  </g>
</svg>
