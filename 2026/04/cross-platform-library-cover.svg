<svg height="450" viewBox="0 0 900 450" width="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="50%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="winGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
    <linearGradient id="linuxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e95420"/>
      <stop offset="100%" stop-color="#c43e18"/>
    </linearGradient>
    <linearGradient id="dotnetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#512bd4"/>
      <stop offset="100%" stop-color="#3a1f9d"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect fill="url(#bgGradient)" width="900" height="450"/>

  <circle cx="100" cy="100" r="80" fill="#512bd4" opacity="0.05"/>
  <circle cx="800" cy="350" r="120" fill="#0078d4" opacity="0.05"/>
  <circle cx="750" cy="100" r="60" fill="#e95420" opacity="0.05"/>

  <text fill="#512bd4" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="600" letter-spacing="4" text-anchor="middle" x="450" y="60">DOTNET CROSS-PLATFORM DEVELOPMENT</text>

  <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" x="450" y="110" filter="url(#textShadow)">.NET跨平台本地库引入实战</text>

  <rect fill="#512bd4" height="4" width="120" x="390" y="130"/>

  <text fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="20" text-anchor="middle" x="450" y="170">深入解析 DllImport 与 NativeLibrary 的正确用法</text>

  <g transform="translate(100, 220)" filter="url(#cardShadow)">
    <rect fill="white" rx="16" width="200" height="160"/>
    <rect fill="url(#winGradient)" rx="12" x="60" y="20" width="80" height="80"/>
    <text fill="white" font-family="Segoe UI, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" x="100" y="70">W</text>
    <text fill="#0078d4" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" x="100" y="125">Windows</text>
    <text fill="#64748b" font-family="Consolas, monospace" font-size="13" text-anchor="middle" x="100" y="148">.dll</text>
  </g>

  <g transform="translate(350, 260)">
    <circle cx="0" cy="0" r="25" fill="#cbd5e1"/>
    <text fill="#475569" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="0" y="8">+</text>
  </g>

  <g transform="translate(350, 330)">
    <circle cx="0" cy="0" r="25" fill="#cbd5e1"/>
    <text fill="#475569" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="0" y="8">=</text>
  </g>

  <g transform="translate(600, 220)" filter="url(#cardShadow)">
    <rect fill="white" rx="16" width="200" height="160"/>
    <rect fill="url(#linuxGradient)" rx="12" x="60" y="20" width="80" height="80"/>
    <text fill="white" font-family="Segoe UI, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" x="100" y="70">L</text>
    <text fill="#e95420" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" x="100" y="125">Linux</text>
    <text fill="#64748b" font-family="Consolas, monospace" font-size="13" text-anchor="middle" x="100" y="148">.so</text>
  </g>

  <g transform="translate(350, 220)" filter="url(#cardShadow)">
    <rect fill="white" rx="16" width="150" height="160"/>
    <rect fill="url(#dotnetGradient)" rx="12" x="35" y="20" width="80" height="80"/>
    <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="75" y="60">统一代码</text>
    <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="500" text-anchor="middle" x="75" y="82">一套代码</text>
    <text fill="#512bd4" font-family="Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" x="75" y="128">多平台运行</text>
  </g>

  <rect fill="white" rx="12" x="250" y="400" width="400" height="35" filter="url(#cardShadow)"/>
  <text fill="#512bd4" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="600" text-anchor="middle" x="450" y="423">dotnet9.com</text>
</svg>
