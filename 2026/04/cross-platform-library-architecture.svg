<svg height="450" viewBox="0 0 800 460" width="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="dotnetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="winGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="linuxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect fill="url(#bgGrad)" width="800" height="460"/>

  <text fill="#1e293b" font-family="Microsoft YaHei, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="400" y="40">跨平台本地库加载架构</text>

  <g transform="translate(300, 60)" filter="url(#shadow)">
    <rect fill="url(#dotnetGrad)" rx="12" width="200" height="60"/>
    <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" x="100" y="38">.NET 应用程序</text>
  </g>

  <path d="M400,120 L400,150" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>

  <g transform="translate(280, 160)" filter="url(#shadow)">
    <rect fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="10" width="240" height="50"/>
    <text fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="600" text-anchor="middle" x="120" y="32">DllImport / NativeLibrary</text>
  </g>

  <path d="M400,210 L400,240" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/>

  <text fill="#64748b" font-family="Microsoft YaHei, sans-serif" font-size="13" text-anchor="middle" x="400" y="260">平台特定加载机制</text>

  <g transform="translate(80, 280)" filter="url(#shadow)">
    <rect fill="url(#winGrad)" rx="12" width="260" height="85"/>
    <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" x="130" y="35">Windows</text>
    <text fill="rgba(255,255,255,0.9)" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" x="130" y="58">LoadLibrary</text>
    <text fill="rgba(255,255,255,0.75)" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" x="130" y="75">系统目录 → 当前目录 → PATH</text>
  </g>

  <g transform="translate(460, 280)" filter="url(#shadow)">
    <rect fill="url(#linuxGrad)" rx="12" width="260" height="85"/>
    <text fill="white" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" x="130" y="35">Linux</text>
    <text fill="rgba(255,255,255,0.9)" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" x="130" y="58">dlopen</text>
    <text fill="rgba(255,255,255,0.75)" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" x="130" y="75">LD_LIBRARY_PATH → /lib → /usr/lib</text>
  </g>

  <path d="M210,380 L210,400" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M590,380 L590,400" stroke="#f97316" stroke-width="3" marker-end="url(#arrowhead)"/>

  <g transform="translate(155, 410)" filter="url(#shadow)">
    <rect fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8" width="110" height="40"/>
    <text fill="#1d4ed8" font-family="Consolas, monospace" font-size="14" font-weight="bold" text-anchor="middle" x="55" y="26">.dll 文件</text>
  </g>

  <g transform="translate(535, 410)" filter="url(#shadow)">
    <rect fill="#ffedd5" stroke="#f97316" stroke-width="2" rx="8" width="110" height="40"/>
    <text fill="#c2410c" font-family="Consolas, monospace" font-size="14" font-weight="bold" text-anchor="middle" x="55" y="26">.so 文件</text>
  </g>
</svg>
