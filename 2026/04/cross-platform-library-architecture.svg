<svg height="400" viewbox="0 0 600 400" width="600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <lineargradient id="bgGrad" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"></stop>
      <stop offset="100%" stop-color="#0d1b2a"></stop>
    </lineargradient>
    <lineargradient id="headerGrad" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#667eea"></stop>
      <stop offset="100%" stop-color="#764ba2"></stop>
    </lineargradient>
    <lineargradient id="winGrad" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0078d4"></stop>
      <stop offset="100%" stop-color="#005a9e"></stop>
    </lineargradient>
    <lineargradient id="linuxGrad" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#e95420"></stop>
      <stop offset="100%" stop-color="#c8410f"></stop>
    </lineargradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <fedropshadow dx="2" dy="2" flood-opacity="0.3" stddeviation="3"></fedropshadow>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect fill="url(#bgGrad)" width="600" height="400"></rect>

  <!-- 装饰元素 -->
  <circle fill="#667eea" opacity="0.15" r="120" x="550" y="-20"></circle>
  <circle fill="#764ba2" opacity="0.1" r="80" x="-20" y="350"></circle>

  <!-- 标题 -->
  <text fill="white" font-family="Microsoft YaHei" font-size="22" font-weight="bold" text-anchor="middle" x="300" y="35">跨平台本地库加载架构</text>

  <!-- .NET 应用 -->
  <rect fill="url(#headerGrad)" filter="url(#shadow)" rx="8" ry="8" x="200" y="60" width="200" height="50"></rect>
  <text fill="white" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" x="300" y="90">.NET 应用</text>

  <!-- DllImport 机制 -->
  <rect fill="rgba(255,255,255,0.1)" filter="url(#shadow)" rx="8" ry="8" x="200" y="130" width="200" height="40"></rect>
  <text fill="white" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" x="300" y="155">DllImport / NativeLibrary</text>

  <!-- 连接线 -->
  <path d="M300,110 L300,130" stroke="#667eea" stroke-width="2"></path>

  <!-- 平台层 -->
  <text fill="#a0a0a0" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="300" y="190">↓ 平台特定加载机制 ↓</text>

  <!-- Windows 分支 -->
  <rect fill="url(#winGrad)" filter="url(#shadow)" rx="8" ry="8" x="80" y="200" width="180" height="70"></rect>
  <text fill="white" font-family="Microsoft YaHei" font-size="15" font-weight="bold" text-anchor="middle" x="170" y="225">Windows</text>
  <text fill="white" font-family="Microsoft YaHei" font-size="11" text-anchor="middle" x="170" y="245">LoadLibrary 搜索路径：</text>
  <text fill="white" font-family="Microsoft YaHei" font-size="10" text-anchor="middle" x="170" y="260">系统目录 → 当前目录 → PATH</text>

  <!-- Linux 分支 -->
  <rect fill="url(#linuxGrad)" filter="url(#shadow)" rx="8" ry="8" x="340" y="200" width="180" height="70"></rect>
  <text fill="white" font-family="Microsoft YaHei" font-size="15" font-weight="bold" text-anchor="middle" x="430" y="225">Linux</text>
  <text fill="white" font-family="Microsoft YaHei" font-size="11" text-anchor="middle" x="430" y="245">dlopen 搜索路径：</text>
  <text fill="white" font-family="Microsoft YaHei" font-size="10" text-anchor="middle" x="430" y="260">LD_LIBRARY_PATH → /lib → /usr/lib</text>

  <!-- 连接线 -->
  <path d="M260,170 L80,200" stroke="#667eea" stroke-width="2" fill="none"></path>
  <path d="M340,170 L520,200" stroke="#667eea" stroke-width="2" fill="none"></path>

  <!-- 库文件 -->
  <text fill="#a0a0a0" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" x="300" y="295">↓ 库文件命名规则不同 ↓</text>

  <!-- Windows DLL -->
  <rect fill="rgba(255,255,255,0.1)" stroke="#0078d4" stroke-width="2" rx="6" ry="6" x="80" y="310" width="120" height="40"></rect>
  <text fill="#4fc3f7" font-family="Consolas" font-size="14" text-anchor="middle" x="140" y="335">StudentUtilApi.dll</text>

  <!-- Linux SO -->
  <rect fill="rgba(255,255,255,0.1)" stroke="#e95420" stroke-width="2" rx="6" ry="6" x="400" y="310" width="120" height="40"></rect>
  <text fill="#ffab91" font-family="Consolas" font-size="14" text-anchor="middle" x="460" y="335">libStudentUtilApi.so</text>

  <!-- 连接线 -->
  <path d="M170,270 L140,310" stroke="#0078d4" stroke-width="2" fill="none"></path>
  <path d="M430,270 L460,310" stroke="#e95420" stroke-width="2" fill="none"></path>

  <!-- 关键说明 -->
  <rect fill="rgba(102,126,234,0.2)" rx="6" ry="6" x="150" y="365" width="300" height="30"></rect>
  <text fill="#a0a0a0" font-family="Microsoft YaHei" font-size="11" text-anchor="middle" x="300" y="385">💡 可通过 SetDllDirectory 或 dlopen 设置搜索路径</text>
</svg>