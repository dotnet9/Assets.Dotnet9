  <rect x="78" y="178" width="322" height="340" rx="18" fill="#fbfdff" stroke="#d5e1ec"/>
  <text x="106" y="222" font-family="Consolas, Cascadia Mono, monospace" font-size="22" font-weight="700" fill="#006adc"># Markdown 输入</text>
  <text x="106" y="264" font-family="Consolas, Cascadia Mono, monospace" font-size="17" fill="#334155">## 代码与表格</text>
  <text x="106" y="302" font-family="Consolas, Cascadia Mono, monospace" font-size="16" fill="#64748b">```csharp</text>
  <text x="106" y="330" font-family="Consolas, Cascadia Mono, monospace" font-size="16" fill="#0f766e">MarkdownViewer.Render()</text>
  <text x="106" y="358" font-family="Consolas, Cascadia Mono, monospace" font-size="16" fill="#64748b">```</text>
  <text x="106" y="402" font-family="Consolas, Cascadia Mono, monospace" font-size="16" fill="#f25f4c">| 主题 | 尺寸 | 状态 |</text>
  <text x="106" y="430" font-family="Consolas, Cascadia Mono, monospace" font-size="16" fill="#64748b">| --- | --- | --- |</text>
  <text x="106" y="458" font-family="Consolas, Cascadia Mono, monospace" font-size="16" fill="#334155">| Basic | Normal | ok |</text>
  <rect x="430" y="178" width="356" height="340" rx="18" fill="#ffffff" stroke="#d5e1ec"/>
  <text x="462" y="228" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="36" font-weight="800" fill="#f25f4c">Avalonia Markdown</text>
