<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">CodeWF.Markdown - Avalonia Markdown viewer control</title>
  <desc id="desc">Cover image for an article introducing CodeWF.Markdown, an Avalonia Markdown rendering control with typography themes, code highlighting, image preview, math rendering, and incremental rendering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.58" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#f7fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#006adc"/>
      <stop offset="1" stop-color="#f25f4c"/>
    </linearGradient>
    <linearGradient id="code" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
