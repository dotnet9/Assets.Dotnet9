  <text x="462" y="298" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="21" fill="#0f172a">实时编辑预览、排版主题、代码高亮</text>
  <text x="462" y="338" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="21" fill="#0f172a">图片预览、数学公式、增量渲染</text>
  <rect x="462" y="374" width="286" height="86" rx="12" fill="#fff5f3" stroke="#ffd6cf"/>
