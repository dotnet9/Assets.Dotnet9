title: Vex 1.0.0：免费开源的 .NET + Avalonia 跨平台 Markdown 编辑器
slug: vex-avalonia-markdown-editor
description: 这篇文章介绍 Vex 1.0.0，一个免费开源的 .NET + Avalonia 跨平台 Markdown 编辑器。它早期参考 Typora 的写作体验，但不追求做成一模一样，也暂不考虑所见即所得实时编辑预览，当前重点是编辑区加预览区、公众号格式复制、文件工作流和基础导出。
