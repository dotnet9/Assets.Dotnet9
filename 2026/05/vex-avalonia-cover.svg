<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vex 1.0.0 Avalonia Markdown editor</title>
  <desc id="desc">Cover image for an article introducing Vex 1.0.0, a cross-platform Markdown editor built with .NET 10 and Avalonia 12.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#eef7f4"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="preview" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="136%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-24%" y="-30%" width="148%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 556 C140 520 250 610 410 574 C560 540 640 470 802 494 C950 516 1040 606 1200 548 L1200 675 L0 675 Z" fill="#dbeafe" opacity="0.72"/>
  <path d="M0 604 C160 574 300 636 456 610 C622 582 738 526 894 552 C1030 575 1110 632 1200 594 L1200 675 L0 675 Z" fill="#ccfbf1" opacity="0.72"/>

  <text x="78" y="78" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Vex 1.0.0</text>
  <text x="78" y="128" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="48" font-weight="850" fill="#0f172a">跨平台 Markdown 编辑器</text>
  <text x="80" y="166" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="21" fill="#475569">.NET 10 + Avalonia 12 · 实时预览 · 文件工作流 · 多主题导出</text>

  <g filter="url(#shadow)">
    <rect x="74" y="204" width="1052" height="368" rx="24" fill="#ffffff" stroke="#cbd8e6"/>
    <rect x="74" y="204" width="1052" height="52" rx="24" fill="#f8fafc"/>
    <rect x="74" y="232" width="1052" height="24" fill="#f8fafc"/>
    <circle cx="108" cy="231" r="7" fill="#ef4444"/>
    <circle cx="132" cy="231" r="7" fill="#f59e0b"/>
    <circle cx="156" cy="231" r="7" fill="#22c55e"/>
    <rect x="190" y="218" width="28" height="26" rx="6" fill="#0f172a"/>
    <path d="M198 224 h12 l-6 14 z" fill="#ffffff"/>
    <rect x="198" y="238" width="14" height="3" rx="1.5" fill="#14b8a6"/>
    <text x="230" y="238" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="800" fill="#111827">Vex</text>
    <text x="298" y="238" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="700" fill="#111827">文件(F)</text>
    <text x="384" y="238" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="700" fill="#111827">编辑(E)</text>
    <text x="470" y="238" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="700" fill="#111827">段落(P)</text>
    <text x="556" y="238" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="700" fill="#111827">格式(O)</text>
    <text x="642" y="238" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="700" fill="#111827">视图(V)</text>
    <text x="728" y="238" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="700" fill="#111827">帮助(H)</text>
    <text x="944" y="238" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#64748b">draft.md</text>

    <rect x="74" y="256" width="246" height="316" fill="#f8fafc"/>
    <line x1="320" y1="256" x2="320" y2="572" stroke="#d8e3ef"/>
    <line x1="742" y1="256" x2="742" y2="572" stroke="#d8e3ef"/>

    <text x="102" y="294" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="800" fill="#0f766e">文件</text>
    <text x="166" y="294" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" fill="#64748b">大纲</text>
    <rect x="96" y="320" width="196" height="58" rx="10" fill="#e0f2fe"/>
    <text x="112" y="346" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="800" fill="#0f172a">vex-release.md</text>
    <text x="112" y="368" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" fill="#475569">Vex 1.0.0</text>
    <rect x="96" y="406" width="170" height="12" rx="6" fill="#dbe5ef"/>
    <rect x="96" y="434" width="138" height="12" rx="6" fill="#dbe5ef"/>
    <rect x="96" y="462" width="186" height="12" rx="6" fill="#dbe5ef"/>

    <text x="360" y="302" font-family="Cascadia Mono, Consolas, monospace" font-size="18" font-weight="700" fill="#991b1b"># Vex 1.0.0</text>
    <text x="360" y="344" font-family="Cascadia Mono, Consolas, monospace" font-size="17" fill="#0f172a">极简之力，妙笔成章。</text>
    <text x="360" y="386" font-family="Cascadia Mono, Consolas, monospace" font-size="17" fill="#0f172a">- 实时预览与源码模式</text>
    <text x="360" y="418" font-family="Cascadia Mono, Consolas, monospace" font-size="17" fill="#0f172a">- 大纲导航与文档统计</text>
    <text x="360" y="450" font-family="Cascadia Mono, Consolas, monospace" font-size="17" fill="#0f172a">- HTML / PNG / PDF 导出</text>
    <rect x="360" y="486" width="318" height="14" rx="7" fill="#e2e8f0"/>
    <rect x="360" y="516" width="244" height="14" rx="7" fill="#e2e8f0"/>

    <rect x="742" y="256" width="384" height="316" fill="url(#preview)"/>
    <text x="786" y="314" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="39" font-weight="850" fill="#334155">Vex 1.0.0</text>
    <text x="786" y="360" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="19" fill="#334155">极简之力，妙笔成章。</text>
    <line x1="786" y1="404" x2="1062" y2="404" stroke="#334155" stroke-width="2"/>
    <text x="786" y="444" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="23" font-weight="800" fill="#334155">主要能力</text>
    <circle cx="802" cy="482" r="4" fill="#0f766e"/>
    <text x="820" y="488" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" fill="#334155">编辑、预览、导出</text>
    <circle cx="802" cy="520" r="4" fill="#2563eb"/>
    <text x="820" y="526" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" fill="#334155">主题、语言、引导</text>
  </g>

  <g filter="url(#soft)">
    <rect x="770" y="88" width="166" height="48" rx="24" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="806" y="119" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">Avalonia 12</text>
    <rect x="952" y="88" width="150" height="48" rx="24" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="994" y="119" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="800" fill="#047857">.NET 10</text>
  </g>

  <g>
    <rect x="78" y="608" width="142" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="111" y="631" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="800" fill="#1d4ed8">Markdown</text>
    <rect x="236" y="608" width="132" height="34" rx="17" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="272" y="631" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="800" fill="#047857">Preview</text>
    <rect x="384" y="608" width="118" height="34" rx="17" fill="#ffffff" stroke="#fed7aa"/>
    <text x="422" y="631" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="800" fill="#c2410c">Export</text>
    <rect x="518" y="608" width="146" height="34" rx="17" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="560" y="631" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="800" fill="#6d28d9">Guide</text>
    <text x="826" y="634" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="24" font-weight="850" fill="#0f172a">dotnet9/Vex · Release v1.0.0</text>
  </g>
</svg>
