<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">CodeWF Avalonia Guide control</title>
  <desc id="desc">Cover image for an article introducing the CodeWF Avalonia Guide onboarding control with overlay masks, popup positioning, menu item highlighting, and TabItem switching in Vex.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.54" stop-color="#eff7ff"/>
      <stop offset="1" stop-color="#f6fbf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="menuPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="guideBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-12%" width="120%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-18%" y="-22%" width="136%" height="144%">
      <feDropShadow dx="0" dy="16" stdDeviation="17" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <filter id="glow" x="-36%" y="-52%" width="172%" height="204%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#60a5fa" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 540 C142 506 256 586 418 552 C580 518 658 448 810 472 C968 498 1046 580 1200 532 L1200 675 L0 675 Z" fill="#dbeafe" opacity="0.78"/>
  <path d="M0 588 C164 558 302 618 456 594 C620 568 740 510 900 538 C1030 560 1104 612 1200 580 L1200 675 L0 675 Z" fill="#d1fae5" opacity="0.72"/>

  <text x="78" y="76" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="23" font-weight="800" fill="#0f172a">CodeWF.AvaloniaControls</text>
  <text x="78" y="122" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="48" font-weight="850" fill="#0f172a">Guide 引导控件</text>
  <text x="80" y="160" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="21" fill="#475569">菜单弹层、高亮遮罩、Tab 切换与 Vex 新手引导落地</text>

  <g filter="url(#cardShadow)">
    <rect x="844" y="58" width="280" height="84" rx="22" fill="url(#guideBadge)" stroke="#bfdbfe"/>
    <circle cx="888" cy="100" r="24" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>
    <path d="M878 101 l8 8 l18 -22" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="928" y="92" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="800" fill="#0f172a">Onboarding Tour</text>
    <text x="928" y="120" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#475569">Popup · Mask · MenuItem</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="72" y="188" width="1056" height="346" rx="26" fill="#ffffff" stroke="#cbd8e6"/>
    <rect x="72" y="188" width="1056" height="54" rx="26" fill="#f8fafc"/>
    <rect x="72" y="220" width="1056" height="22" fill="#f8fafc"/>
    <circle cx="106" cy="215" r="7" fill="#ef4444"/>
    <circle cx="130" cy="215" r="7" fill="#f59e0b"/>
    <circle cx="154" cy="215" r="7" fill="#22c55e"/>
    <text x="184" y="223" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="700" fill="#111827">Vex</text>

