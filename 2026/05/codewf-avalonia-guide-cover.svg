    <text x="674" y="223" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="700" fill="#111827">帮助(H)</text>
    <text x="990" y="223" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#64748b">guide-demo.md</text>

    <rect x="72" y="242" width="270" height="292" fill="#f8fafc"/>
    <line x1="342" y1="242" x2="342" y2="534" stroke="#d8e3ef"/>
    <line x1="730" y1="242" x2="730" y2="534" stroke="#d8e3ef"/>
    <rect x="96" y="264" width="50" height="28" rx="7" fill="#ffffff" stroke="#d8e3ef"/>
    <text x="109" y="283" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="800" fill="#1d4ed8">文件</text>
    <text x="162" y="283" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" fill="#64748b">大纲</text>
    <rect x="96" y="320" width="190" height="12" rx="6" fill="#dbe5ef"/>
    <rect x="96" y="352" width="152" height="12" rx="6" fill="#dbe5ef"/>
    <rect x="96" y="384" width="178" height="12" rx="6" fill="#dbe5ef"/>

    <text x="382" y="286" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="800" fill="#ef4444"># 新手引导</text>
    <text x="382" y="328" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" fill="#111827">点击菜单后高亮目标控件。</text>
    <rect x="382" y="366" width="286" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="382" y="398" width="236" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="382" y="430" width="304" height="12" rx="6" fill="#e2e8f0"/>

    <text x="872" y="302" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="39" font-weight="850" fill="#334155">新手引导</text>
    <text x="872" y="348" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="19" fill="#334155">菜单、弹层、侧栏与预览区</text>
    <rect x="778" y="390" width="190" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="778" y="422" width="246" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="778" y="454" width="210" height="12" rx="6" fill="#e2e8f0"/>
  </g>

  <rect x="72" y="242" width="1056" height="292" fill="#0f172a" opacity="0.54"/>

  <g filter="url(#cardShadow)">
    <rect x="494" y="230" width="138" height="204" rx="12" fill="url(#menuPanel)"/>
    <text x="522" y="264" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#cbd5e1">加粗</text>
    <text x="522" y="300" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#cbd5e1">斜体</text>
    <text x="522" y="336" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#cbd5e1">行内代码</text>
    <rect x="506" y="354" width="110" height="38" rx="8" fill="#ffffff"/>
    <text x="522" y="379" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="800" fill="#0f172a">链接</text>
    <text x="522" y="416" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#cbd5e1">图片</text>
  </g>

  <rect x="503" y="350" width="118" height="46" rx="10" fill="none" stroke="#ffffff" stroke-width="3"/>
  <rect x="503" y="350" width="118" height="46" rx="10" fill="none" stroke="#60a5fa" stroke-width="5" opacity="0.92" filter="url(#glow)"/>

  <g filter="url(#cardShadow)">
    <path d="M632 374 L660 356 L660 392 Z" fill="#ffffff"/>
    <rect x="654" y="294" width="382" height="172" rx="18" fill="#ffffff" stroke="#dbe5ef"/>
    <text x="688" y="340" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="26" font-weight="800" fill="#0f172a">文本格式</text>
    <text x="688" y="380" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" fill="#475569">打开菜单后继续圈选 MenuItem，</text>
    <text x="688" y="408" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" fill="#475569">弹层目标也能稳定定位。</text>
    <circle cx="694" cy="438" r="4" fill="#93c5fd"/>
    <circle cx="712" cy="438" r="4" fill="#93c5fd"/>
    <circle cx="730" cy="438" r="4" fill="#2563eb"/>
    <circle cx="748" cy="438" r="4" fill="#cbd5e1"/>
    <circle cx="766" cy="438" r="4" fill="#cbd5e1"/>
    <rect x="866" y="417" width="70" height="34" rx="8" fill="#eff6ff"/>
    <text x="887" y="439" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="800" fill="#2563eb">上一步</text>
    <rect x="942" y="417" width="70" height="34" rx="8" fill="url(#accent)"/>
    <text x="958" y="439" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" font-weight="800" fill="#ffffff">下一步</text>
  </g>

  <g>
    <rect x="78" y="568" width="152" height="34" rx="17" fill="#ffffff" stroke="#bfdbfe"/>
    <text x="111" y="591" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="800" fill="#1d4ed8">遮罩高亮</text>
    <rect x="246" y="568" width="150" height="34" rx="17" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="285" y="591" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="800" fill="#047857">Popup 定位</text>
    <rect x="412" y="568" width="156" height="34" rx="17" fill="#ffffff" stroke="#fed7aa"/>
    <text x="446" y="591" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="800" fill="#c2410c">MenuItem</text>
    <rect x="584" y="568" width="158" height="34" rx="17" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="626" y="591" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="800" fill="#6d28d9">TabItem</text>
    <text x="820" y="608" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="24" font-weight="850" fill="#0f172a">Vex 新手引导实战</text>
