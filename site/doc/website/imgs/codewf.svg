  <text x="112" y="190" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="24" letter-spacing="0">ASP.NET Core Razor Pages website source</text>
  <text x="112" y="236" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="20" letter-spacing="0">Blog, project center, tools, search, sitemap</text>
  <rect x="112" y="266" width="116" height="34" rx="6" fill="#0ea5e9" opacity=".95"/>
  <text x="132" y="289" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="0">Website</text>
</svg>
