<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">CodeWF project cover</title>
  <desc id="desc">Cover card for the CodeWF website source repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#164e63"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
    </pattern>
  </defs>
  <rect width="960" height="360" rx="0" fill="url(#bg)"/>
  <rect width="960" height="360" fill="url(#grid)"/>
  <rect x="72" y="64" width="12" height="232" rx="6" fill="#38bdf8"/>
  <g transform="translate(650 68)" fill="none" stroke="#67e8f9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity=".95">
    <path d="M36 112 94 54l58 58-58 58z"/>
    <path d="M94 54V20M94 170v34M36 112H4M184 112h32"/>
    <path d="M62 112h64"/>
  </g>
