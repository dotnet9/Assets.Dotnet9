<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">CodeWF.Markdown project cover</title>
  <desc id="desc">Cover card for the Avalonia Markdown viewer project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#701a75"/>
    </linearGradient>
    <pattern id="text" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M8 14h32M8 28h24" stroke="#ffffff" stroke-opacity=".07" stroke-width="4" stroke-linecap="round"/>
    </pattern>
  </defs>
  <rect width="960" height="360" fill="url(#bg)"/>
